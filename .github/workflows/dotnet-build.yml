name: .NET Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: true
      DOTNET_CLI_TELEMETRY_OPTOUT: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Show .NET info
        run: dotnet --info

      - name: Restore (detailed)
        run: |
          set -euo pipefail
          echo "Running: dotnet restore src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --verbosity detailed"
          dotnet restore src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --verbosity detailed > restore.log 2>&1 || (
            echo "dotnet restore failed"
            cat restore.log
            exit 1
          )

      - name: Upload restore.log
        uses: actions/upload-artifact@v4
        with:
          name: restore-log
          path: restore.log

      - name: Build (detailed + binlog)
        run: |
          set -euo pipefail
          echo "Running: dotnet build src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --no-restore --configuration Release --verbosity detailed /v:d /bl:build.binlog"
          dotnet build src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --no-restore --configuration Release --verbosity detailed /v:d /bl:build.binlog > build.log 2>&1 || (
            echo "dotnet build failed"
            cat build.log
            # keep binlog if produced for diagnostics
            exit 1
          )

      - name: Upload build.log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload build.binlog (if present)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-binlog
          path: build.binlog
