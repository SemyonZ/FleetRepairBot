name: .NET Build

on:
  push:
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Restore (capture detailed logs)
        id: restore
        run: |
          set -o pipefail
          mkdir -p logs
          echo "=== dotnet restore START ==="
          dotnet restore src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --verbosity diagnostic 2>&1 | tee logs/restore.log
          echo "=== dotnet restore END ==="
        shell: bash

      - name: Build (no-restore, capture detailed logs)
        id: build
        run: |
          set -o pipefail
          mkdir -p logs
          echo "=== dotnet build START ==="
          dotnet build src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --no-restore --configuration Release --verbosity detailed 2>&1 | tee logs/build.log
          echo "=== dotnet build END ==="
        shell: bash

      - name: Upload logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-logs
          path: |
            logs/restore.log
            logs/build.log

      - name: Print tail of logs for quick inspection (always)
        if: always()
        run: |
          echo "--- Last 500 lines of restore.log (if present) ---"
          if [ -f logs/restore.log ]; then tail -n 500 logs/restore.log || true; else echo "restore.log not found"; fi
          echo "--- Last 500 lines of build.log (if present) ---"
          if [ -f logs/build.log ]; then tail -n 500 logs/build.log || true; else echo "build.log not found"; fi
        shell: bash
