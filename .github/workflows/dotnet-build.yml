name: .NET Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 6
        uses: actions/setup-dotnet@v4
        with:
         dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore FleetRepairBot.sln

      - name: Build
        run: dotnet build FleetRepairBot.sln -c Release --no-restore
