name: .NET Build (detailed logs)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Dotnet info
        run: dotnet --info > dotnet-info.txt

      - name: Restore
        shell: bash
        run: |
          set -o pipefail
          dotnet restore src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --verbosity detailed 2>&1 | tee restore.log
          rc=${PIPESTATUS[0]}
          if [ $rc -ne 0 ]; then
            echo "dotnet restore failed with exit code $rc"
            echo "---- Restore log start ----"
            sed -n '1,2000p' restore.log || true
            echo "---- Restore log end ----"
            exit $rc
          fi

      - name: Build
        shell: bash
        run: |
          set -o pipefail
          dotnet build src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --no-restore --configuration Release --verbosity detailed 2>&1 | tee build.log
          rc=${PIPESTATUS[0]}
          if [ $rc -ne 0 ]; then
            echo "dotnet build failed with exit code $rc"
            echo "---- Build log start ----"
            sed -n '1,2000p' build.log || true
            echo "---- Build log end ----"
            exit $rc
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-logs
          path: |
            dotnet-info.txt
            restore.log
            build.log
