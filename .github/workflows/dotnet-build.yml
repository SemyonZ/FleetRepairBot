name: .NET Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Restore (detailed)
        run: |
          set -o pipefail
          mkdir -p logs
          dotnet restore src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --verbosity detailed 2>&1 | tee logs/restore.log

      - name: Upload restore log
        uses: actions/upload-artifact@v4
        with:
          name: restore-log
          path: logs/restore.log

      - name: Build (no-restore, detailed)
        run: |
          set -o pipefail
          mkdir -p logs
          dotnet build src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --no-restore --configuration Release --verbosity detailed 2>&1 | tee logs/build.log

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: logs/build.log

      - name: Optional diagnostic logs (run when RUN_DIAGNOSTIC=true)
        if: ${{ env.RUN_DIAGNOSTIC == 'true' }}
        run: |
          set -o pipefail
          mkdir -p logs
          dotnet restore src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --verbosity diagnostic 2>&1 | tee logs/restore-diagnostic.log
          dotnet build src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --no-restore --configuration Release --verbosity diagnostic 2>&1 | tee logs/build-diagnostic.log

      - name: Upload diagnostic logs
        if: ${{ env.RUN_DIAGNOSTIC == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: diagnostic-logs
          path: |
            logs/restore-diagnostic.log
            logs/build-diagnostic.log
