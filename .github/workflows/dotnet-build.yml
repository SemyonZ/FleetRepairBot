name: .NET Build (detailed + binary logs)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore (detailed)
        id: restore
        run: |
          echo "Running: dotnet restore src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --verbosity detailed"
          dotnet restore src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --verbosity detailed > restore.log 2>&1

      - name: Build (detailed + binary msbuild log)
        id: build_step
        run: |
          echo "Running: dotnet build src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --no-restore --configuration Release --verbosity detailed /bl:msbuild.binlog"
          dotnet build src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --no-restore --configuration Release --verbosity detailed /bl:msbuild.binlog > build.log 2>&1

      - name: Show last lines of logs for quick UI inspection
        if: always()
        run: |
          echo "===== restore.log (last 2000 lines) ====="
          tail -n 2000 restore.log || true
          echo "===== build.log (last 2000 lines) ====="
          tail -n 2000 build.log || true

      - name: Upload build artifacts (logs + msbuild binary log)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            restore.log
            build.log
            msbuild.binlog
