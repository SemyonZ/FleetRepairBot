name: .NET Build

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Print environment and dotnet info
        shell: bash
        run: |
          echo "=== GITHUB ENV ===" > env.txt
          printenv >> env.txt || true
          echo "=== RUNNER FILES ===" > runner-files.txt
          ls -la >> runner-files.txt || true
          echo "=== DOTNET INFO ===" > dotnet-info.txt
          dotnet --info >> dotnet-info.txt 2>&1 || true
          dotnet --list-sdks > sdks.txt 2>&1 || true

      - name: Restore (detailed)
        shell: bash
        run: |
          set -o pipefail
          echo "Running: dotnet restore src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --verbosity diagnostic"
          dotnet restore src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --verbosity diagnostic |& tee restore.log

      - name: Build (detailed, no-restore)
        shell: bash
        run: |
          set -o pipefail
          echo "Running: dotnet build src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --no-restore --configuration Release --verbosity diagnostic"
          dotnet build src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --no-restore --configuration Release --verbosity diagnostic |& tee build.log

      - name: Upload logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-logs
          path: |
            restore.log
            build.log
            dotnet-info.txt
            sdks.txt
            env.txt
            runner-files.txt
