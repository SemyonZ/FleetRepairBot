name: .NET CI - Build

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

# This workflow intentionally runs restore/build with increased verbosity and uploads logs
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Restore (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # Run diagnostic restore and capture all output to restore.log
          dotnet restore src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --verbosity diagnostic 2>&1 | Tee-Object restore.log

      - name: Restore (Linux/Mac)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          # Run diagnostic restore and capture all output to restore.log
          dotnet restore src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --verbosity diagnostic | tee restore.log

      - name: Upload restore log
        uses: actions/upload-artifact@v4
        with:
          name: restore-log-${{ matrix.os }}
          path: restore.log

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # Build without restoring (to keep logs separate) and capture detailed output
          dotnet build src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --no-restore --configuration Release --verbosity detailed 2>&1 | Tee-Object build.log

      - name: Build (Linux/Mac)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          # Build without restoring (to keep logs separate) and capture detailed output
          dotnet build src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --no-restore --configuration Release --verbosity detailed | tee build.log

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.os }}
          path: build.log
