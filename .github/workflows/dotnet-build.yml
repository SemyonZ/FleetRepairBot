name: .NET Build (detailed + binary msbuild log)

on:
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable ACTIONS_STEP_DEBUG (true/false) to increase runner debug verbosity'
        required: false
        default: 'false'
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    name: Build (detailed + binary msbuild log)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        dotnet-version: ['6.0.x']
    env:
      # Optional: set to 'true' via workflow_dispatch input to enable step debug
      ACTIONS_STEP_DEBUG: ${{ inputs.debug || 'false' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Restore (detailed) - Linux
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -e
          echo "Running dotnet restore (detailed) for src/FleetRepairBot.Web/FleetRepairBot.Web.csproj"
          dotnet restore src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --verbosity detailed > restore.log 2>&1 || true
          echo "Restore exit code: $?"

      - name: Restore (detailed) - Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Write-Host "Running dotnet restore (detailed) for src/FleetRepairBot.Web/FleetRepairBot.Web.csproj"
          dotnet restore src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --verbosity detailed 2>&1 | Tee-Object -FilePath restore.log

      - name: Build (detailed + binlog) - Linux
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -e
          echo "Running dotnet build (detailed) with binary msbuild log"
          dotnet build src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --no-restore --configuration Release -v:detailed -bl:msbuild.binlog > build.log 2>&1 || true
          echo "Build exit code: $?"

      - name: Build (detailed + binlog) - Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Write-Host "Running dotnet build (detailed) with binary msbuild log"
          dotnet build src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --no-restore --configuration Release -v:detailed -bl:msbuild.binlog 2>&1 | Tee-Object -FilePath build.log

      - name: List logs (for debug)
        shell: bash
        if: matrix.os == 'ubuntu-latest'
        run: |
          echo "---- restore.log ----"
          sed -n '1,200p' restore.log || true
          echo "---- build.log ----"
          sed -n '1,200p' build.log || true

      - name: List logs (for debug) - Windows
        shell: pwsh
        if: matrix.os == 'windows-latest'
        run: |
          Write-Host "---- restore.log ----"
          Get-Content restore.log -TotalCount 200 -ErrorAction SilentlyContinue
          Write-Host "---- build.log ----"
          Get-Content build.log -TotalCount 200 -ErrorAction SilentlyContinue

      - name: Upload logs and binlog
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.os }}
          path: |
            restore.log
            build.log
            msbuild.binlog
