name: .NET Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Restore
        run: |
          # Run explicit restore for the sole project with detailed verbosity and capture output to a file.
          dotnet restore src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --verbosity detailed > restore.log 2>&1 || (cat restore.log && exit 1)

      - name: Save restore log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: restore-log
          path: restore.log

      - name: Diagnostics
        run: |
          # Collect runtime/SDK and NuGet diagnostics to help analyze restore/build failures.
          echo "==== dotnet --list-sdks ====" > diagnostics.log
          dotnet --list-sdks >> diagnostics.log 2>&1 || true
          echo "\n==== dotnet --info ====" >> diagnostics.log
          dotnet --info >> diagnostics.log 2>&1 || true
          echo "\n==== dotnet nuget locals all --list ====" >> diagnostics.log
          dotnet nuget locals all --list >> diagnostics.log 2>&1 || true

      - name: Save diagnostics log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-log
          path: diagnostics.log

      - name: Build
        run: |
          # Build the single project without restore, with detailed verbosity and write output to build.log.
          dotnet build src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --no-restore --configuration Release --verbosity detailed > build.log 2>&1 || (cat build.log && exit 1)

      - name: Save build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
