name: .NET Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          # Adjust the SDK version as needed for the project (e.g. 7.0.x, 8.0.x)
          dotnet-version: '7.0.x'

      - name: Save dotnet --info
        run: |
          dotnet --info 2>&1 | tee dotnet-info.log

      - name: Restore (capture detailed logs)
        run: |
          # Restore targeted project and capture detailed logs
          dotnet restore src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --verbosity detailed 2>&1 | tee restore.log
        continue-on-error: true

      - name: Upload restore log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: restore-log-${{ github.run_id }}.log
          path: restore.log

      - name: Build (capture detailed logs)
        run: |
          # Build targeted project without restoring and capture detailed logs
          dotnet build src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --no-restore --configuration Release --verbosity detailed 2>&1 | tee build.log
        continue-on-error: true

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_id }}.log
          path: build.log

      - name: Upload dotnet-info
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-info-${{ github.run_id }}.log
          path: dotnet-info.log
