name: .NET Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Restore (detailed) and capture log
        run: |
          set -o pipefail
          mkdir -p build_logs
          echo "Starting dotnet restore for src/FleetRepairBot.Web/FleetRepairBot.Web.csproj"
          dotnet restore src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --verbosity detailed 2>&1 | tee build_logs/restore.log

      - name: Build (no-restore, detailed) and capture log
        run: |
          set -o pipefail
          echo "Starting dotnet build for src/FleetRepairBot.Web/FleetRepairBot.Web.csproj"
          dotnet build src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --no-restore --configuration Release --verbosity detailed 2>&1 | tee build_logs/build.log

      - name: Upload restore and build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-logs
          path: build_logs
