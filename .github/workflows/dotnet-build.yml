name: .NET Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Configure DOTNET environment
        run: |
          echo "DOTNET_CLI_TELEMETRY_OPTOUT=1" >> $GITHUB_ENV
          echo "DOTNET_SKIP_FIRST_TIME_EXPERIENCE=1" >> $GITHUB_ENV

      - name: dotnet --info
        run: dotnet --info

      - name: Restore (capture detailed logs)
        run: |
          dotnet restore src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --verbosity detailed > restore.log 2>&1 || (echo "restore failed, see restore.log" && cat restore.log && exit 1)

      - name: Build (capture detailed logs)
        run: |
          dotnet build src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --no-restore --configuration Release --verbosity detailed > build.log 2>&1 || (echo "build failed, see build.log" && cat build.log && exit 1)

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: |
            restore.log
            build.log
