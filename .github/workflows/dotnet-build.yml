name: .NET Build

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        configuration: [Release]
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Save environment
        run: |
          env > environment.txt || true

      - name: Dotnet --info
        run: |
          dotnet --info > dotnet-info.txt || true

      - name: Restore (diagnostic)
        id: restore_step
        run: |
          # ensure we always produce logs even on failure
          set -o pipefail
          dotnet restore src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --verbosity diagnostic > restore.log 2>&1 || true
          echo $? > restore_exit.code

      - name: Build (diagnostic + binlog)
        id: build_step
        run: |
          set -o pipefail
          dotnet build src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --no-restore --configuration ${{ matrix.configuration }} --verbosity diagnostic /bl:msbuild.binlog > build.log 2>&1 || true
          echo $? > build_exit.code

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_id }}
          path: |
            restore.log
            build.log
            msbuild.binlog
            dotnet-info.txt
            environment.txt
            restore_exit.code
            build_exit.code

      - name: Fail if restore/build failed
        run: |
          restore_code=0
          build_code=0
          if [ -f restore_exit.code ]; then restore_code=$(cat restore_exit.code); fi
          if [ -f build_exit.code ]; then build_code=$(cat build_exit.code); fi

          echo "Restore exit code: $restore_code"
          echo "Build exit code: $build_code"

          # Prefer reporting build failure if both failed
          if [ "$restore_code" -ne 0 ] || [ "$build_code" -ne 0 ]; then
            if [ "$build_code" -ne 0 ]; then
              echo "Build failed with exit code $build_code"
              exit $build_code
            else
              echo "Restore failed with exit code $restore_code"
              exit $restore_code
            fi
          fi

      - name: Success
        if: success()
        run: echo "Build completed successfully and logs uploaded."
