name: CI - dotnet build logs

on:
  push: {}
  pull_request: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Runner diagnostics and dotnet --info
        run: |
          echo "=== Environment ==="
          printenv || true
          echo "\n=== PATH ==="
          echo "$PATH" || true
          echo "\n=== Workspace listing ==="
          ls -la || true
          echo "\n=== dotnet --info ==="
          dotnet --info > dotnet-info.txt 2>&1 || true
          echo "--- dotnet --info (first lines) ---"
          head -n 50 dotnet-info.txt || true

      - name: Dotnet restore (detailed)
        continue-on-error: true
        run: |
          set +e
          set -o pipefail
          echo "Running dotnet restore for src/FleetRepairBot.Web/FleetRepairBot.Web.csproj"
          dotnet restore src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --verbosity detailed > restore.log 2>&1
          echo "$?" > restore_exit_code.txt
          echo "restore.log size: $(wc -c < restore.log 2>/dev/null || echo 0) bytes"

      - name: Dotnet build (detailed, no-restore)
        continue-on-error: true
        run: |
          set +e
          set -o pipefail
          echo "Running dotnet build for src/FleetRepairBot.Web/FleetRepairBot.Web.csproj (Release, no-restore)"
          dotnet build src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --no-restore --configuration Release --verbosity detailed > build.log 2>&1
          echo "$?" > build_exit_code.txt
          echo "build.log size: $(wc -c < build.log 2>/dev/null || echo 0) bytes"

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-build-logs
          path: |
            dotnet-info.txt
            restore.log
            build.log

      - name: Upload exit codes (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-exit-codes
          path: |
            restore_exit_code.txt
            build_exit_code.txt

      - name: Fail if restore or build failed
        if: always()
        run: |
          set +e
          restore_exit=1
          build_exit=1
          if [ -f restore_exit_code.txt ]; then restore_exit=$(cat restore_exit_code.txt || echo 1); fi
          if [ -f build_exit_code.txt ]; then build_exit=$(cat build_exit_code.txt || echo 1); fi
          echo "Restore exit code: $restore_exit"
          echo "Build exit code: $build_exit"
          if [ "${restore_exit}" -ne 0 ] || [ "${build_exit}" -ne 0 ]; then
            echo "One or more dotnet steps failed. See uploaded logs: dotnet-info.txt, restore.log, build.log"
            exit 1
          fi
          echo "Both restore and build reported exit code 0."
