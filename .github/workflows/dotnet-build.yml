name: CI Build with detailed logs

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
      ACTIONS_STEP_DEBUG: 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore with detailed logging
        if: always()
        run: |
          set -o pipefail
          echo "Restore start: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          dotnet restore src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --verbosity detailed 2>&1 | tee restore.log
          echo "Restore end: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
        shell: bash

      - name: Upload restore logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: restore-log
          path: restore.log

      - name: Build with detailed logging
        if: always()
        run: |
          set -o pipefail
          echo "Build start: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          dotnet build src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --no-restore --configuration Release --verbosity detailed 2>&1 | tee build.log
          echo "Build end: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
        shell: bash

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload all logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: all-logs
          path: |
            restore.log
            build.log
