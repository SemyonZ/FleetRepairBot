name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'

      - name: Dotnet info
        run: |
          dotnet --info | tee dotnet-info.txt

      - name: Restore
        run: |
          set -o pipefail
          # Restore with detailed verbosity and save output to restore.log
          dotnet restore src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --verbosity detailed 2>&1 | tee restore.log
          rc=${PIPESTATUS[0]}
          if [ "$rc" -ne 0 ]; then
            echo "dotnet restore failed with exit code $rc"
            exit $rc
          fi

      - name: Build
        run: |
          set -o pipefail
          # Build with detailed verbosity and save output to build.log
          dotnet build src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --no-restore --configuration Release --verbosity detailed 2>&1 | tee build.log
          rc=${PIPESTATUS[0]}
          if [ "$rc" -ne 0 ]; then
            echo "dotnet build failed with exit code $rc"
            exit $rc
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            restore.log
            build.log
            dotnet-info.txt
