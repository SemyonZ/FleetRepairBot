name: .NET Build (with detailed logs)

on:
  push:
  pull_request:

jobs:
  build:
    name: build (ubuntu-latest)
    runs-on: ubuntu-latest
    env:
      ACTIONS_RUNNER_DEBUG: "true"
      ACTIONS_STEP_DEBUG: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: dotnet --info (save)
        run: |
          dotnet --info 2>&1 | tee dotnet-info.txt

      - name: Workspace listing (save)
        run: |
          echo "PWD: $(pwd)" > workspace-ls.txt
          ls -la . >> workspace-ls.txt 2>&1 || true

      - name: Restore (detailed) and save logs
        run: |
          # Use detailed verbosity and save the log. Ensure we capture dotnet exit code correctly.
          set -o pipefail
          dotnet restore src/FleetRepairBot.Web/FleetRepairBot.Web.csproj -v:detailed 2>&1 | tee restore.log
          rc=$?
          echo "RESTORE_RC=$rc" >> restore.log
          # Do not fail the job here to ensure artifacts (logs) are always uploaded for analysis.
          exit $rc
        continue-on-error: true
        shell: bash

      - name: Build (no-restore, detailed) and save logs
        run: |
          set -o pipefail
          dotnet build src/FleetRepairBot.Web/FleetRepairBot.Web.csproj --no-restore --configuration Release -v:detailed 2>&1 | tee build.log
          rc=$?
          echo "BUILD_RC=$rc" >> build.log
          # Keep job progressing so logs are uploaded even if build failed.
          exit $rc
        continue-on-error: true
        shell: bash

      - name: Upload build logs artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            dotnet-info.txt
            workspace-ls.txt
            restore.log
            build.log
