name: CI

on:
push:
branches: [ main ]
pull_request:
branches: [ main ]

jobs:
build:
runs-on: ubuntu-latest


steps:
  - uses: actions/checkout@v4

  - name: Setup .NET
    uses: actions/setup-dotnet@v4
    with:
      dotnet-version: '6.0.x'

  - name: Restore (capture logs)
    shell: bash
    run: |
      mkdir -p build-logs

      echo "Running dotnet restore..."

      dotnet restore src/FleetRepairBot.Web/FleetRepairBot.Web.csproj \
        --verbosity diagnostic \
        > build-logs/restore.log 2>&1

      RESTORE_EXIT=$?

      echo "===== RESTORE LOG ====="
      tail -n 200 build-logs/restore.log || true

      exit $RESTORE_EXIT

  - name: Build (capture logs)
    shell: bash
    run: |
      echo "Running dotnet build..."

      dotnet build src/FleetRepairBot.Web/FleetRepairBot.Web.csproj \
        --no-restore \
        --configuration Release \
        --verbosity diagnostic \
        > build-logs/build.log 2>&1

      BUILD_EXIT=$?

      echo "===== BUILD LOG ====="
      tail -n 200 build-logs/build.log || true

      exit $BUILD_EXIT

  - name: Upload logs
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: build-logs
      path: build-logs/**

  - name: Print log tails
    if: always()
    shell: bash
    run: |
      echo "==== RESTORE ===="
      tail -n 200 build-logs/restore.log || true

      echo "==== BUILD ===="
      tail -n 200 build-logs/build.log || true
