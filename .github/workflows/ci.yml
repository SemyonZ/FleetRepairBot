name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
      DOTNET_CLI_CONTEXT_VERBOSE: 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'
      - name: Dotnet --info (capture environment)
        run: dotnet --info 2>&1 | tee dotnet-info.txt
      - name: Restore (detailed, capture logs)
        run: |
          set -o pipefail
          # Restore the solution with detailed verbosity and capture output to restore.log
          dotnet restore FleetRepairBot.sln --verbosity detailed 2>&1 | tee restore.log
      - name: Build (detailed, capture logs)
        run: |
          set -o pipefail
          # Build the solution (no-restore) and capture output to build.log
          dotnet build FleetRepairBot.sln --configuration Release --no-restore --verbosity detailed 2>&1 | tee build.log
      - name: Test (capture logs)
        run: |
          set -o pipefail
          dotnet test --no-build --verbosity normal 2>&1 | tee test.log
      - name: Upload dotnet logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-logs
          path: |
            dotnet-info.txt
            restore.log
            build.log
            test.log
